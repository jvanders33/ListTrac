# Weekly data refresh: re-scrape everything, rebuild the SQLite snapshot,
# commit it — the push triggers Vercel's auto-redeploy of list-trac.vercel.app.
#
# Runs Mondays 6am Melbourne time (Sunday 20:00 UTC), after the weekend's
# games. Also triggerable by hand from the Actions tab (workflow_dispatch).
#
# NOTE for the 2027 rollover: --end is pinned to 2026 because the contract
# sources are year-bound. When the 2026 season wraps, bump --end below AND
# update DEFAULT_URL in scraper/afl_free_agents.py to the AFL's 2027 FA
# article (they publish updates at new URLs).
name: Weekly data refresh

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Rebuild database from live sources
        run: python data/load.py --start 1986 --end 2026

      - name: Refresh official player ratings (Champion Data)
        # rebuild history too so the current season's ratings stay live all
        # year and new seasons roll in automatically
        run: python scraper/afl_ratings.py --history 2015
        continue-on-error: true  # token/feed hiccup shouldn't block the data push

      - name: Refresh prospect playing history (Rookie Me Central)
        # per-competition stats for every draft prospect — updates as the
        # SANFL/WAFL/Coates/championship seasons are played
        run: python scraper/prospect_stats.py
        continue-on-error: true

      - name: Build percentile scouting reports (AFL/Champion Data)
        # ranks each player's per-game output vs same-position peers
        run: python scraper/scouting.py
        continue-on-error: true

      - name: Enrich prospect stats from the AFL (Champion Data)
        # official Coates Talent League / U18 champs / VFL / SANFL stats —
        # current-season + senior games RMC misses. Runs AFTER RMC to merge on.
        run: python scraper/afl_talent.py
        continue-on-error: true

      - name: Rebuild full draft-prospect pools (AFL by DOB)
        # every pathway player eligible for the 2027/2028 drafts, classified by
        # date of birth, with curated All-Australian/award honours merged back
        run: python scraper/draft_pool.py
        continue-on-error: true

      - name: Fetch confirmed signings from the AFL content API
        # official contract signings from afl.com.au — runs BEFORE contracts.py
        # so they merge into the timeline (and catch what AFLRATINGS misses)
        run: python scraper/afl_signings.py
        continue-on-error: true

      - name: Refresh contract-event history (AFL.com.au + AFLRATINGS)
        # dated signings/extensions/trades/delistings — the missing middle of
        # each player's timeline between draft and free agency
        run: python scraper/contracts.py
        continue-on-error: true

      - name: Sanity-check the rebuilt snapshot
        run: |
          python - <<'EOF'
          import sqlite3
          conn = sqlite3.connect("data/listtrac.db")
          players = conn.execute("SELECT COUNT(*) FROM player").fetchone()[0]
          picks = conn.execute("SELECT COUNT(*) FROM draft_pick").fetchone()[0]
          statuses = conn.execute("SELECT COUNT(*) FROM contract_status WHERE is_current=1").fetchone()[0]
          print(f"players={players} picks={picks} current_statuses={statuses}")
          # refuse to publish a snapshot that lost most of its data
          assert players > 4000, "player count collapsed - source layout change?"
          assert picks > 4000, "draft pick count collapsed - source layout change?"
          assert statuses > 700, "contract statuses collapsed - source layout change?"
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "listtrac-refresh[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/listtrac.db data/*.json
          if git diff --cached --quiet; then
            echo "No data changes this week."
          else
            git commit -m "Weekly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
